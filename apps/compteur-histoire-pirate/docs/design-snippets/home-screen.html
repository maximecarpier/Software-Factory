<!DOCTYPE html>
<!-- SNIPPET: home-screen -->
<!--
  ÉCRAN 1 — Accueil
  Props injectées depuis fixtures.js :
    - histoires[].id
    - histoires[].titre
    - histoires[].imageVignette  (string | null)
    - histoires[].dureeEstimee   (number, minutes)
  Événement : tap sur .story-card → navigate(histoire.id)
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Histoires de Pirates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Variables (extrait de _tokens.css) ── */
    :root {
      --c-bg:       #0a0a0f;
      --c-surface:  #0d1b2a;
      --c-accent:   #c9a227;
      --c-text:     #f5e6c8;
      --c-muted:    #6b7a8d;
      --c-accent-20: rgba(201, 162, 39, 0.20);
      --c-accent-30: rgba(201, 162, 39, 0.30);
      --c-surface-80: rgba(13, 27, 42, 0.80);
      --font-display: 'Cinzel', Georgia, serif;
      --font-body:    'Lora', Georgia, serif;
      --font-ui:      'Inter', system-ui, sans-serif;
      --shadow-card:   0 4px 24px rgba(0, 0, 0, 0.50);
      --shadow-accent: 0 4px 20px rgba(201, 162, 39, 0.30);
      --border-accent: 1px solid rgba(201, 162, 39, 0.20);
      --radius-xl: 20px;
      --min-touch:  2.75rem;
      --t-base:     200ms ease;
      --t-fast:     150ms ease;
      --safe-top:    env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font-body);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; max-width: 100%; }
    button, li { -webkit-tap-highlight-color: transparent; }
    ol { list-style: none; }

    /* ── Screen layout ── */
    .screen-home {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-top: var(--safe-top);
    }

    /* ── Header ── */
    .home-header {
      padding: 2rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.625rem;
      text-align: center;
    }

    .home-header__ornament {
      color: var(--c-accent);
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .home-header__title {
      font-family: var(--font-display);
      font-size: 1.5rem;     /* 24px */
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--c-text);
      line-height: 1.2;
    }

    .home-header__subtitle {
      font-family: var(--font-body);
      font-size: 1rem;       /* 16px */
      font-style: italic;
      color: var(--c-muted);
      line-height: 1.4;
    }

    /* Séparateur décoratif */
    .home-header__divider {
      width: 64px;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--c-accent-30) 50%,
        transparent 100%
      );
      margin-top: 0.375rem;
    }

    /* ── Stories list ── */
    .stories-list {
      flex: 1;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-bottom: calc(1.5rem + var(--safe-bottom));
    }

    /* ── Story card ── */
    .story-card {
      background: var(--c-surface);
      border: var(--border-accent);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: transform var(--t-base), box-shadow var(--t-base);
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .story-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-accent);
    }

    /* ── Cover image zone ── */
    .story-card__cover {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }

    /* Placeholder (toujours visible, couvert par l'image si elle charge) */
    .story-card__placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0f2236 0%, #070d14 100%);
    }

    .story-card__placeholder svg {
      width: 40px;
      height: 40px;
      color: rgba(201, 162, 39, 0.30);
    }

    /* Image réelle — couvre le placeholder quand elle charge */
    /* code-implementer : ajouter onerror="this.style.display='none'" */
    .story-card__img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Badge durée */
    .story-card__badge {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      z-index: 2;
      background: var(--c-surface-80);
      border: var(--border-accent);
      border-radius: 999px;
      padding: 0.25rem 0.625rem;
      font-family: var(--font-ui);
      font-size: 0.75rem;     /* 12px */
      font-weight: 500;
      color: var(--c-accent);
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── Card body ── */
    .story-card__body {
      padding: 1rem 1.25rem 1.25rem;
    }

    .story-card__title {
      font-family: var(--font-display);
      font-size: 1.125rem;    /* 18px */
      font-weight: 600;
      color: var(--c-text);
      line-height: 1.3;
      letter-spacing: 0.02em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <main class="screen-home">

    <!-- ── En-tête ── -->
    <header class="home-header">
      <!-- Icône ancre (Lucide Anchor) -->
      <svg class="home-header__ornament" xmlns="http://www.w3.org/2000/svg"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <circle cx="12" cy="5" r="3"/>
        <line x1="12" y1="22" x2="12" y2="8"/>
        <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
      </svg>
      <h1 class="home-header__title">Histoires de Pirates</h1>
      <p class="home-header__subtitle">Choisis ton aventure</p>
      <div class="home-header__divider" aria-hidden="true"></div>
    </header>

    <!-- ── Liste des histoires ── -->
    <ol class="stories-list">

      <!-- Vignette 1 -->
      <li>
        <article class="story-card"
                 tabindex="0"
                 role="button"
                 data-id="histoire-1"
                 aria-label="Le Trésor de l'Île Maudite, environ 5 minutes">
          <div class="story-card__cover">
            <div class="story-card__placeholder" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="5" r="3"/>
                <line x1="12" y1="22" x2="12" y2="8"/>
                <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
              </svg>
            </div>
            <img
              src="/assets/images/histoire-1-vignette.jpg"
              alt=""
              class="story-card__img"
              loading="lazy"
            >
            <span class="story-card__badge">~5 min</span>
          </div>
          <div class="story-card__body">
            <h2 class="story-card__title">Le Trésor de l'Île Maudite</h2>
          </div>
        </article>
      </li>

      <!-- Vignette 2 -->
      <li>
        <article class="story-card"
                 tabindex="0"
                 role="button"
                 data-id="histoire-2"
                 aria-label="La Tempête du Cap Horn, environ 6 minutes">
          <div class="story-card__cover">
            <div class="story-card__placeholder" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="5" r="3"/>
                <line x1="12" y1="22" x2="12" y2="8"/>
                <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
              </svg>
            </div>
            <img
              src="/assets/images/histoire-2-vignette.jpg"
              alt=""
              class="story-card__img"
              loading="lazy"
            >
            <span class="story-card__badge">~6 min</span>
          </div>
          <div class="story-card__body">
            <h2 class="story-card__title">La Tempête du Cap Horn</h2>
          </div>
        </article>
      </li>

    </ol>
  </main>
</body>
</html>
