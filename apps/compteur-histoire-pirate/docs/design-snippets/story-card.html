<!-- SNIPPET: story-card -->
<!--
  Contrat données :
    - histoire.id            (string)  → data-id
    - histoire.titre         (string)  → .story-card__title
    - histoire.imageVignette (string|null) → .story-card__img[src]
    - histoire.dureeEstimee  (number)  → .story-card__badge (minutes)
  Événement : tap/click sur le card → navigate(histoire.id)
  Variantes : state normal | state active (:active) | state focus-visible
-->

<!--
  CSS requis (classes issues de _tokens.css + home-screen.html) :

  .story-card {
    background: var(--c-surface);
    border: var(--border-accent);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: transform var(--t-base), box-shadow var(--t-base);
    display: block;
    color: inherit;
    text-decoration: none;
  }
  .story-card:active  { transform: scale(0.97); box-shadow: var(--shadow-accent); }
  .story-card:focus-visible {
    outline: 2px solid var(--c-accent);
    outline-offset: 2px;
  }

  .story-card__cover { position: relative; aspect-ratio: 16/9; overflow: hidden; }

  .story-card__placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, #0f2236 0%, #070d14 100%);
  }
  .story-card__placeholder svg { width: 40px; height: 40px; color: rgba(201,162,39,0.30); }

  .story-card__img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
  }

  .story-card__badge {
    position: absolute; top: 0.75rem; right: 0.75rem; z-index: 2;
    background: var(--c-surface-80); border: var(--border-accent); border-radius: 999px;
    padding: 0.25rem 0.625rem;
    font-family: var(--font-ui); font-size: 0.75rem; font-weight: 500;
    color: var(--c-accent); letter-spacing: 0.04em;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }

  .story-card__body { padding: 1rem 1.25rem 1.25rem; }

  .story-card__title {
    font-family: var(--font-display); font-size: 1.125rem; font-weight: 600;
    color: var(--c-text); line-height: 1.3; letter-spacing: 0.02em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
-->

<!-- Variante : état normal -->
<article class="story-card"
         tabindex="0"
         role="button"
         data-id="histoire-1"
         aria-label="Le Trésor de l'Île Maudite, environ 5 minutes">
  <div class="story-card__cover">
    <!-- Placeholder toujours visible, couvert par l'img si elle charge -->
    <div class="story-card__placeholder" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="5" r="3"/>
        <line x1="12" y1="22" x2="12" y2="8"/>
        <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
      </svg>
    </div>
    <!-- code-implementer : ajouter onerror="this.style.display='none'" -->
    <img
      src="/assets/images/histoire-1-vignette.jpg"
      alt=""
      class="story-card__img"
      loading="lazy"
    >
    <span class="story-card__badge">~5 min</span>
  </div>
  <div class="story-card__body">
    <h2 class="story-card__title">Le Trésor de l'Île Maudite</h2>
  </div>
</article>
