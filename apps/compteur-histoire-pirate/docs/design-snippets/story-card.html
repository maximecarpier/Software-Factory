<!-- SNIPPET: story-card -->
<!--
  Contrat données :
    - histoire.id            (string)  → data-id
    - histoire.titre         (string)  → .story-card__title
    - histoire.imageVignette (string|null) → .story-card__img[src]
    - histoire.dureeEstimee  (number)  → .story-card__badge (minutes)
  Événement : tap/click sur la card → navigate(histoire.id)

  V2 — Styles taverne (tavern.css surcharge app.css) :
    - Bordure extérieure or renforcée (0.40 vs 0.20)
    - box-shadow double : liseré inset ambre sombre + lueur ambre ambiante
    - .story-card__title : text-shadow doré/sombre pour relief
    - .story-card__placeholder : gradient brun-noir réchauffé
-->

<!-- ─── État normal ─── -->
<article class="story-card"
         tabindex="0"
         role="button"
         data-id="histoire-1"
         aria-label="Le Trésor de l'Île Maudite, environ 5 minutes">
  <div class="story-card__cover">
    <!-- Placeholder toujours présent, masqué par l'image si elle charge -->
    <div class="story-card__placeholder" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="5" r="3"/>
        <line x1="12" y1="22" x2="12" y2="8"/>
        <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
      </svg>
    </div>
    <img
      src="/assets/images/histoire-1-vignette.jpg"
      alt=""
      class="story-card__img"
      loading="lazy"
      onerror="this.style.display='none'"
    >
    <span class="story-card__badge">~5 min</span>
  </div>
  <div class="story-card__body">
    <h2 class="story-card__title">Le Trésor de l'Île Maudite</h2>
  </div>
</article>

<!--
  ─── STYLES EFFECTIFS (tavern.css) — référence visuelle ───────────

  .story-card {
    border: 1px solid rgba(201,162,39, 0.40);      ← or plus prononcé (vs 0.20)
    box-shadow:
      inset 0 0 0 1px rgba(139,94,10, 0.24),       ← liseré intérieur sombre ambre
      0 6px 32px rgba(0,0,0, 0.65),                ← ombre portée profonde
      0 0 20px rgba(201,162,39, 0.07);             ← lueur ambre ambiante
    border-radius: var(--radius-xl);               ← inchangé (app.css)
    overflow: hidden;                              ← inchangé (app.css)
  }

  .story-card:active {
    transform: scale(0.97);                        ← inchangé (app.css)
    box-shadow:
      inset 0 0 0 1px rgba(139,94,10, 0.24),
      0 0 24px rgba(201,162,39, 0.22);            ← lueur plus vive au tap
  }

  .story-card:focus-visible {
    outline: 2px solid rgba(201,162,39, 0.65);
    outline-offset: 3px;
    box-shadow:
      inset 0 0 0 1px rgba(139,94,10, 0.24),
      0 6px 32px rgba(0,0,0, 0.65),
      0 0 28px rgba(201,162,39, 0.18);
  }

  .story-card__title {
    text-shadow: 0 1px 4px rgba(0,0,0, 0.65);     ← relief sur fond sombre
  }

  .story-card__placeholder {
    background: linear-gradient(145deg, #0b1520 0%, #050805 100%);  ← brun réchauffé
  }
-->
