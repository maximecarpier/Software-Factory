<!DOCTYPE html>
<!-- SNIPPET: intro-screen -->
<!--
  ÉCRAN 2 — Image Introductive
  Props injectées depuis fixtures.js (histoire sélectionnée) :
    - histoire.titre
    - histoire.sousTitre
    - histoire.imageIntro  (string | null)
    - histoire.dureeEstimee  (number, minutes)
  Événements :
    - tap .btn-back       → navigate('accueil')
    - tap .btn-primary    → navigate('lecture', histoire.id), démarrer TTS +1s
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Le Trésor de l'Île Maudite — Histoires de Pirates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg:        #0a0a0f;
      --c-surface:   #0d1b2a;
      --c-accent:    #c9a227;
      --c-text:      #f5e6c8;
      --c-muted:     #6b7a8d;
      --c-accent-20: rgba(201, 162, 39, 0.20);
      --c-accent-30: rgba(201, 162, 39, 0.30);
      --c-surface-80: rgba(13, 27, 42, 0.80);
      --font-display: 'Cinzel', Georgia, serif;
      --font-body:    'Lora', Georgia, serif;
      --font-ui:      'Inter', system-ui, sans-serif;
      --shadow-accent: 0 4px 20px rgba(201, 162, 39, 0.30);
      --border-accent: 1px solid rgba(201, 162, 39, 0.20);
      --radius-lg: 16px;
      --min-touch:  2.75rem;
      --t-base:     200ms ease;
      --t-fast:     150ms ease;
      --safe-top:    env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font-body);
      min-height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; }
    button { cursor: pointer; border: none; background: none; font: inherit;
             color: inherit; -webkit-tap-highlight-color: transparent; }

    /* ── Screen layout — image plein écran ── */
    .screen-intro {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Couche image de fond ── */
    .intro-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* Placeholder sombre (visible si image absente/en chargement) */
    .intro-bg__placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #0f2236 0%, #040a10 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .intro-bg__placeholder svg {
      width: 80px;
      height: 80px;
      color: rgba(201, 162, 39, 0.15);
    }

    /* Image plein écran */
    .intro-bg__img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
    }

    /* Spinner de chargement (affiché par JS pendant le chargement de l'image) */
    /* .intro-bg--loading .intro-loading { display: flex } */
    .intro-loading {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .intro-loading__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--c-accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1);   }
    }

    /* ── Couche UI (overlay) ── */
    .intro-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none; /* les enfants activent pointer-events au besoin */
    }

    /* ── Bouton retour (haut gauche) ── */
    .btn-back {
      pointer-events: auto;
      margin: var(--safe-top) 0 0 1rem;
      width: 2.75rem;   /* 44px */
      height: 2.75rem;
      border-radius: 50%;
      background: rgba(13, 27, 42, 0.70);
      border: 1px solid rgba(245, 230, 200, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform var(--t-fast), background var(--t-fast);
    }

    .btn-back:active {
      transform: scale(0.92);
      background: rgba(13, 27, 42, 0.90);
    }

    .btn-back svg {
      width: 20px;
      height: 20px;
      color: var(--c-text);
    }

    /* ── Zone bas — gradient + contenu ── */
    .intro-bottom {
      pointer-events: auto;
      position: relative;
    }

    /* Gradient sombre du bas pour lisibilité du texte */
    .intro-gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 420px;
      background: linear-gradient(
        to top,
        rgba(10, 10, 15, 0.97) 0%,
        rgba(10, 10, 15, 0.85) 30%,
        rgba(10, 10, 15, 0.50) 60%,
        rgba(10, 10, 15, 0.00) 100%
      );
      pointer-events: none;
    }

    /* Contenu textuel + bouton */
    .intro-content {
      position: relative;
      z-index: 1;
      padding: 1.5rem 1.5rem calc(1.5rem + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Badge durée */
    .badge-duration {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      align-self: flex-start;
      background: var(--c-surface-80);
      border: var(--border-accent);
      border-radius: 999px;
      padding: 0.3rem 0.75rem;
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--c-accent);
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Titre de l'histoire */
    .intro-title {
      font-family: var(--font-display);
      font-size: 1.875rem;  /* 30px */
      font-weight: 700;
      color: var(--c-text);
      line-height: 1.2;
      letter-spacing: 0.03em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Sous-titre */
    .intro-subtitle {
      font-family: var(--font-body);
      font-size: 1rem;
      font-style: italic;
      color: rgba(245, 230, 200, 0.65);
      line-height: 1.5;
    }

    /* ── Bouton principal CTA ── */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.625rem;
      width: 100%;
      min-height: var(--min-touch);
      padding: 1rem 1.5rem;
      margin-top: 0.5rem;
      background: var(--c-accent);
      color: var(--c-bg);
      border-radius: var(--radius-lg);
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      box-shadow: var(--shadow-accent);
      transition: transform var(--t-fast), opacity var(--t-fast), box-shadow var(--t-fast);
      cursor: pointer;
    }

    .btn-primary:active {
      transform: scale(0.97);
      opacity: 0.88;
      box-shadow: none;
    }

    /* État chargement (TTS en démarrage) */
    /* .btn-primary--loading : désactivé + opacité réduite, géré par JS */
    .btn-primary--loading {
      opacity: 0.60;
      pointer-events: none;
    }

    .btn-primary svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <main class="screen-intro">

    <!-- ── Couche image de fond ── -->
    <div class="intro-bg" aria-hidden="true">
      <div class="intro-bg__placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="3"/>
          <line x1="12" y1="22" x2="12" y2="8"/>
          <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
        </svg>
      </div>
      <!-- code-implementer : ajouter class="intro-bg--loading" pendant le chargement -->
      <!-- code-implementer : ajouter onerror="this.style.display='none'" sur l'img -->
      <img
        src="/assets/images/histoire-1-intro.jpg"
        alt=""
        class="intro-bg__img"
      >
      <div class="intro-loading" aria-hidden="true">
        <div class="intro-loading__dot"></div>
      </div>
    </div>

    <!-- ── Couche UI overlay ── -->
    <div class="intro-overlay">

      <!-- Bouton retour -->
      <button class="btn-back" aria-label="Retour à l'accueil">
        <!-- Heroicons chevron-left -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.75 19.5 8.25 12l7.5-7.5"/>
        </svg>
      </button>

      <!-- Zone bas -->
      <div class="intro-bottom">
        <div class="intro-gradient" aria-hidden="true"></div>
        <div class="intro-content">
          <span class="badge-duration">~5 min</span>
          <h1 class="intro-title">Le Trésor de l'Île Maudite</h1>
          <p class="intro-subtitle">Une aventure dans les Caraïbes</p>
          <button class="btn-primary" aria-label="Écouter l'histoire Le Trésor de l'Île Maudite">
            <!-- Heroicons play solid -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
            </svg>
            Écouter l'histoire
          </button>
        </div>
      </div>

    </div>
  </main>
</body>
</html>
