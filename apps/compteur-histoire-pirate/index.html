<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Histoires de Pirates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>

  <!-- ════════════════════════════════════════
       SCREEN 1 — Accueil
       ════════════════════════════════════════ -->
  <section id="screen-home" class="screen is-active" aria-label="Accueil">
    <main class="screen-home">

      <header class="home-header">
        <svg class="home-header__ornament" xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="12" cy="5" r="3"/>
          <line x1="12" y1="22" x2="12" y2="8"/>
          <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
        </svg>
        <h1 class="home-header__title">Histoires de Pirates</h1>
        <p class="home-header__subtitle">Choisis ton aventure</p>
        <div class="home-header__divider" aria-hidden="true"></div>
      </header>

      <!-- Populé dynamiquement par home.js -->
      <ol class="stories-list" id="stories-list"></ol>

    </main>
  </section>

  <!-- ════════════════════════════════════════
       SCREEN 2 — Image Introductive
       ════════════════════════════════════════ -->
  <section id="screen-intro" class="screen" aria-label="Image Introductive">
    <main class="screen-intro">

      <!-- Couche image de fond -->
      <div class="intro-bg" aria-hidden="true">
        <div class="intro-bg__placeholder">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="3"/>
            <line x1="12" y1="22" x2="12" y2="8"/>
            <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
          </svg>
        </div>
        <img id="intro-bg-img" src="" alt="" class="intro-bg__img" style="display:none" onerror="this.style.display='none'">
        <div class="intro-loading" aria-hidden="true">
          <div class="intro-loading__dot"></div>
        </div>
      </div>

      <!-- Couche UI -->
      <div class="intro-overlay">

        <button id="intro-btn-back" class="btn-back" aria-label="Retour à l'accueil">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15.75 19.5 8.25 12l7.5-7.5"/>
          </svg>
        </button>

        <div class="intro-bottom">
          <div class="intro-gradient" aria-hidden="true"></div>
          <div class="intro-content">
            <span id="intro-badge" class="badge-duration">~5 min</span>
            <h1 id="intro-title" class="intro-title"></h1>
            <p id="intro-subtitle" class="intro-subtitle"></p>
            <button id="intro-btn-primary" class="btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
              </svg>
              Écouter l'histoire
            </button>
          </div>
        </div>

      </div>
    </main>
  </section>

  <!-- ════════════════════════════════════════
       SCREEN 3 — Lecture
       ════════════════════════════════════════ -->
  <section id="screen-reader" class="screen" aria-label="Lecture">
    <main class="screen-reader">

      <!-- En-tête fixe -->
      <header class="reader-header">
        <button id="reader-btn-back" class="btn-back" aria-label="Retour à l'accueil">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15.75 19.5 8.25 12l7.5-7.5"/>
          </svg>
        </button>
        <h1 id="reader-title" class="reader-header__title"></h1>
        <div class="reader-header__spacer" aria-hidden="true"></div>
      </header>

      <!-- Bandeau TTS indisponible -->
      <div id="reader-banner" class="reader-banner" role="alert" aria-live="polite">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <p class="reader-banner__text">
          Lecture audio non disponible sur ce navigateur. Le texte reste lisible.
        </p>
      </div>

      <!-- Zone scrollable -->
      <div class="reader-content" id="reader-content">
        <!-- Populé dynamiquement par reader.js -->
        <div id="reader-paragraphs" class="reader-paragraphs"></div>
      </div>

      <!-- Fondu bas -->
      <div class="reader-fade" aria-hidden="true"></div>

      <!-- Barre de lecture -->
      <div class="reader-bar" role="toolbar" aria-label="Contrôles de lecture">

        <div class="reader-bar__progress" aria-hidden="true">
          <div class="reader-bar__track">
            <div id="reader-progress-fill" class="reader-bar__fill" style="width: 0%"></div>
          </div>
        </div>

        <div class="reader-bar__controls">

          <button id="reader-btn-restart" class="btn-restart" aria-label="Recommencer depuis le début">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
            </svg>
          </button>

          <button id="reader-btn-playpause" class="btn-playpause"
                  aria-label="Reprendre la lecture"
                  aria-pressed="false">
            <!-- Icône Play (visible quand pausé) -->
            <svg class="btn-playpause__icon-play"
                 xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
            </svg>
            <!-- Icône Pause (visible quand en lecture) -->
            <svg class="btn-playpause__icon-pause"
                 xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 0 1 .75-.75H9a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H7.5a.75.75 0 0 1-.75-.75V5.25Zm7.5 0A.75.75 0 0 1 15 4.5h1.5a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H15a.75.75 0 0 1-.75-.75V5.25Z" clip-rule="evenodd"/>
            </svg>
          </button>

          <div class="reader-bar__spacer" aria-hidden="true"></div>

        </div>
      </div>

    </main>
  </section>

  <!-- ════════════════════════════════════════
       SCREEN 4 — Fin d'histoire
       ════════════════════════════════════════ -->
  <section id="screen-end" class="screen" aria-label="Fin d'histoire">
    <main class="screen-end">
      <div class="end-content">

        <div class="end-ornament" aria-hidden="true">
          <div class="end-ornament__line"></div>
          <svg class="end-ornament__icon" xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="3"/>
            <line x1="12" y1="22" x2="12" y2="8"/>
            <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
          </svg>
          <div class="end-ornament__line end-ornament__line--right"></div>
        </div>

        <h1 class="end-title">Fin de l'aventure&nbsp;!</h1>

        <!-- Mis à jour par end.js -->
        <p id="end-message" class="end-message"></p>

        <div class="end-illustration">
          <div class="end-illustration__placeholder" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="3"/>
              <line x1="12" y1="22" x2="12" y2="8"/>
              <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
            </svg>
            <span class="end-illustration__placeholder-label">Illustration de fin</span>
          </div>
          <img id="end-illustration-img" src="" alt="" class="end-illustration__img"
               style="display:none" onerror="this.style.display='none'">
        </div>

        <button id="end-btn-home" class="btn-home" aria-label="Retourner à l'accueil">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <circle cx="12" cy="5" r="3"/>
            <line x1="12" y1="22" x2="12" y2="8"/>
            <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
          </svg>
          Retourner à l'accueil
        </button>

      </div>
    </main>
  </section>

  <script type="module" src="src/app.js"></script>
</body>
</html>
