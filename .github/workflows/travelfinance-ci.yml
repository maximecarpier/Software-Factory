name: TravelFinance — Tests

on:
  push:
    paths:
      - "apps/travelfinance/**"
  pull_request:
    paths:
      - "apps/travelfinance/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/travelfinance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/travelfinance/package-lock.json

      - run: npm ci

      - run: npm test
